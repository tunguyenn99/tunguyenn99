<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="100%" height="auto">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="accent-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <linearGradient id="accent-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1f2937" stroke-width="0.5" opacity="0.6"/>
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="900" height="280" fill="url(#bg-grad)" rx="16" />

  <!-- Grid overlay -->
  <rect width="900" height="280" fill="url(#grid)" rx="16" />

  <!-- Decorative Glowing Orbs -->
  <circle cx="800" cy="80" r="100" fill="#8B5CF6" opacity="0.12" filter="url(#glow)" />
  <circle cx="850" cy="200" r="80" fill="#06B6D4" opacity="0.12" filter="url(#glow)" />
  <circle cx="100" cy="240" r="60" fill="#3B82F6" opacity="0.08" filter="url(#glow)" />

  <!-- Abstract Tech Line Art (Data Pipelines/Nodes) -->
  <g opacity="0.25" stroke="#ffffff" stroke-width="1.5">
    <!-- Main flow lines -->
    <path d="M 600,140 L 680,140 L 720,100 L 800,100" fill="none" stroke="url(#accent-cyan)" stroke-width="2" />
    <path d="M 640,140 L 680,180 L 760,180" fill="none" stroke="url(#accent-purple)" stroke-width="2" />
    
    <!-- Connection dots -->
    <circle cx="600" cy="140" r="4" fill="#06B6D4" />
    <circle cx="680" cy="140" r="3" fill="#ffffff" />
    <circle cx="720" cy="100" r="3" fill="#ffffff" />
    <circle cx="800" cy="100" r="5" fill="#3B82F6" />
    <circle cx="680" cy="180" r="3" fill="#ffffff" />
    <circle cx="760" cy="180" r="4" fill="#EC4899" />
  </g>

  <!-- Title & Name -->
  <text x="60" y="90" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-weight="800" font-size="38" fill="#ffffff" letter-spacing="0.5">
    Tu Nguyen
  </text>
  
  <text x="60" y="130" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-weight="600" font-size="20" fill="url(#accent-cyan)" letter-spacing="1">
    SENIOR ANALYTICS ENGINEER
  </text>

  <!-- Bio / Taglines -->
  <text x="60" y="180" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-weight="400" font-size="14" fill="#9CA3AF">
    🚀 Engineering modern data stack pipelines &amp; Single Source of Truth
  </text>
  <text x="60" y="205" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-weight="400" font-size="14" fill="#9CA3AF">
    📊 Bridging fragmented raw data to executive-level strategic decisions
  </text>

  <!-- Badge at top right -->
  <g transform="translate(720, 30)">
    <rect width="130" height="26" rx="13" fill="#1f2937" stroke="#374151" stroke-width="1" />
    <circle cx="15" cy="13" r="5" fill="#10B981" />
    <text x="28" y="17" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-weight="600" font-size="11" fill="#10B981">
      Open for Collab
    </text>
  </g>
</svg>
