name: Generate Isometric Calendar

on:
  schedule:
    - cron: "0 0 * * *" # Runs at 00:00 UTC every day
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Isometric View
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          # SỬA Ở ĐÂY: Đặt tên file đơn giản
          filename: github-isometric-calendar.svg
          output_action: none 

      - name: Push to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          # SỬA Ở ĐÂY: Lấy file ở ngay thư mục gốc của máy ảo
          build_dir: . 
          commit_message: "Build the City [bot]"
          allow_empty_commit: true
          jekyll: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}